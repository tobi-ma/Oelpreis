name: Tägliche Preisabfrage

on:
  schedule:
    # Täglich um 10:00 Uhr (UTC+1 = 09:00 UTC)
    - cron: "0 9 * * *"
  workflow_dispatch:  # Manueller Start jederzeit möglich

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Preisdaten sammeln
        run: python collect_daily.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.csv
          git diff --staged --quiet || git commit -m "chore: Preisupdate $(date '+%Y-%m-%d')"
          git push
